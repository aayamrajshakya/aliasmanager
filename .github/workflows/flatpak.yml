name: Build for Linux (Flatpak)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-flatpak:
    name: "Flatpak"
    runs-on: ubuntu-latest

    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: io.github.aayamrajshakya.aliasmanager.flatpak
          manifest-path: io.github.aayamrajshakya.aliasmanager.json
          cache-key: flatpak-builder-${{ github.sha }}
